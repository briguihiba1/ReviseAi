<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Study Quiz{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- CSS personnalisé déporté -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

    {% block extra_head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <div class="brand-icon"><i class="bi bi-stars text-light"></i></div>
            <span class="fw-bold">StudyQuiz<span class="text-info">AI</span></span>
        </a>
    </div>
</nav>

<main class="py-4 fade-in">
    {% block content %}{% endblock %}
</main>

<footer class="footer-bar mt-auto py-4 border-top bg-white">
    <div class="container text-center">
        <p class="mb-0 text-muted small">
            <i class="bi bi-stars text-accent me-1"></i>
            StudyQuizAI — Apprends plus vite, retiens plus longtemps.
            <span class="mx-2">·</span>
            Propulsé par <strong>Llama-3 & Groq</strong>
        </p>
    </div>
</footer>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- HTML2PDF Library for Export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
